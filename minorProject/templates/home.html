<!DOCTYPE html>
<html>
<head>
  <title>PoPCorn Picker</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <link href="https://fonts.googleapis.com/css?family=IBM+Plex+Sans&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@7.2.0/dist/css/autoComplete.min.css">
  <link rel="icon" href="data:,">

  <script type="text/javascript"> var films = {{suggestions|tojson}}; </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #181818;
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ══════════════════════════════════════
       SLIDERS — fixed background
    ══════════════════════════════════════ */
    .slider-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .slider-bg-bottom {
      position: fixed;
      bottom: 40px;
      left: 0;
      width: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .slider {
      width: 100%;
      height: var(--height);
      overflow: hidden;
      mask-image: linear-gradient(to right, transparent, #000 10% 90%, transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, #000 10% 90%, transparent);
    }

    .slider .list {
      display: flex;
      width: 100%;
      min-width: calc(var(--width) * var(--quantity));
      position: relative;
    }

    .slider .list .item {
      width: var(--width);
      height: var(--height);
      position: absolute;
      left: 100%;
      animation: autoRun 10s linear infinite;
      transition: filter 0.5s;
      animation-delay: calc( (10s / var(--quantity)) * (var(--position) - 1) ) !important;
    }

    .slider .list .item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @keyframes autoRun {
      from { left: 100%; }
      to   { left: calc(var(--width) * -1); }
    }

    .slider[reverse="true"] .list .item {
      left: calc(var(--width) * -1);
      animation: reversePlay 10s linear infinite;
      animation-delay: calc( (10s / var(--quantity)) * (var(--position) - 1) * -1 ) !important;
    }

    @keyframes reversePlay {
      from { left: calc(var(--width) * -1); }
      to   { left: 100%; }
    }

    /* ══════════════════════════════════════
       PAGE CONTENT
    ══════════════════════════════════════ */
    #page-content {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 60px;
    }

    /* ── frosted glass search card ── */
    .search-card {
      width: 700px;
      max-width: 100%;
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      background: rgba(24, 24, 24, 0.75);
      border-radius: 30px;
      padding: 40px 50px 36px;
      animation: fadeUp 0.7s ease both;
      text-align: center;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .search-card h1 {
      font-family: 'Netflix Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: orange;
      font-weight: bold;
      margin-bottom: 6px;
      text-shadow: #000 0 0 13px;
    }

    .subtitle {
      color: #ccc;
      font-size: 13px;
      margin-bottom: 28px;
      letter-spacing: 0.5px;
    }

    /* search input */
    #autoComplete {
      background-color: #ffffff !important;
      background-image: none !important;
      border: none !important;
      border-radius: 8px !important;
      padding: 10px 16px !important;
      font-size: 15px !important;
      color: #181818 !important;
      width: 80% !important;
      height: auto !important;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25) !important;
      outline: none !important;
      transition: box-shadow 0.2s !important;
      caret-color: #181818 !important;
    }
    #autoComplete:hover {
      background-image: none !important;
      background-color: #ffffff !important;
      width: 80% !important;
      height: auto !important;
      color: #181818 !important;
      padding: 10px 16px !important;
    }
    #autoComplete:focus {
      background-image: none !important;
      background-color: #ffffff !important;
      width: 80% !important;
      height: auto !important;
      color: #181818 !important;
      padding: 10px 16px !important;
      box-shadow: 0 0 0 3px rgba(255,165,0,0.5) !important;
    }
    #autoComplete::placeholder {
      color: #888 !important;
      font-size: 15px !important;
    }

    /* buttons */
    .btn-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 20px;
    }

    .btn-search {
      background: transparent;
      border: 2px solid red;
      color: white;
      border-radius: 8px;
      padding: 10px 36px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-search:hover { background: red; color: #fff; }
    .btn-search:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-together {
      background: transparent;
      border: 2px solid orange;
      color: orange;
      border-radius: 8px;
      padding: 10px 28px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-together:hover {
      background: orange;
      color: #181818;
      text-decoration: none;
    }

    /* autocomplete dropdown */
    #food_list {
      background: #fff;
      color: #181818;
      border-radius: 8px;
      z-index: 999;
    }

    /* ══════════════════════════════════════
       RESULTS SECTION
    ══════════════════════════════════════ */
    .fail {
      display: none;
      color: white;
      text-align: center;
      margin-top: 30px;
      width: 100%;
      max-width: 1200px;
      padding: 30px 40px;
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      background: rgba(24, 24, 24, 0.75);
      border-radius: 30px;
    }

    .results {
      width: 100%;
      max-width: 1200px;
      margin-top: 60px;
      padding: 30px 40px 40px;
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      background: rgba(24, 24, 24, 0.75);
      border-radius: 30px;
    }

    .results:empty { display: none; }

    /* ── footer ── */
    .footer {
      background-color: orange;
      color: black;
      text-align: center;
      width: 100%;
      padding: 10px 0;
      position: relative;
      z-index: 3;
    }

    /* loader */
    #loader {
      display: none;
      position: fixed;
      z-index: 100;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-image: url("../static/loader.gif");
      background-size: 20%;
      background-position: 50% 50%;
      background-color: rgba(255,255,255,1);
      background-repeat: no-repeat;
    }

    @media (max-width: 750px) {
      .search-card { padding: 28px 20px; }
      #autoComplete,
      #autoComplete:hover,
      #autoComplete:focus { width: 100% !important; }
      .results-card { padding: 20px; }
    }
  </style>
</head>

<body>
