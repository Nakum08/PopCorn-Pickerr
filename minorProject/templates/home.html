<!DOCTYPE html>
<html lang="en">
<head>
  <title>PoPCorn Picker</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css?family=IBM+Plex+Sans&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">

  <!-- Third-party CSS libraries -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@7.2.0/dist/css/autoComplete.min.css">

  <!-- Our own stylesheet for this page -->
  <link rel="stylesheet" href="/static/home.css">

  <!-- Blank favicon so the browser doesn't throw a 404 for favicon.ico -->
  <link rel="icon" href="data:,">

  <!-- Preload carousel images at top priority so they appear immediately -->
  <link rel="preload" as="image" href="/static/img1.jpg">
  <link rel="preload" as="image" href="/static/img2.jpg">
  <link rel="preload" as="image" href="/static/img3.jpg">
  <link rel="preload" as="image" href="/static/img4.jpeg">
  <link rel="preload" as="image" href="/static/img5.jpeg">
  <link rel="preload" as="image" href="/static/img6.jpeg">
  <link rel="preload" as="image" href="/static/img7.jpeg">
  <link rel="preload" as="image" href="/static/img8.jpeg">
  <link rel="preload" as="image" href="/static/img9.jpeg">
  <link rel="preload" as="image" href="/static/img10.jpeg">

  <!-- Flask injects the movie list here so autocomplete.js can use it -->
  <script type="text/javascript"> var films = {{suggestions|tojson}}; </script>
</head>

<body>

  <!-- BACKGROUND CAROUSEL — TOP ROW-->
  <div class="slider-bg">
    <div class="slider" style="--width:350px; --height:220px;">
      <div class="list">
        <div class="item"><img src="/static/img1.jpg"   alt="" loading="eager"></div>
        <div class="item"><img src="/static/img2.jpg"   alt="" loading="eager"></div>
        <div class="item"><img src="/static/img3.jpg"   alt="" loading="eager"></div>
        <div class="item"><img src="/static/img4.jpeg"  alt="" loading="eager"></div>
        <div class="item"><img src="/static/img5.jpeg"  alt="" loading="eager"></div>
        <div class="item"><img src="/static/img6.jpeg"  alt="" loading="eager"></div>
        <div class="item"><img src="/static/img7.jpeg"  alt="" loading="eager"></div>
        <div class="item"><img src="/static/img8.jpeg"  alt="" loading="eager"></div>
        <div class="item"><img src="/static/img9.jpeg"  alt="" loading="eager"></div>
        <div class="item"><img src="/static/img10.jpeg" alt="" loading="eager"></div>
        <!-- Duplicate set makes the CSS translateX loop seamless -->
        <div class="item"><img src="/static/img1.jpg"   alt="" loading="eager"></div>
        <div class="item"><img src="/static/img2.jpg"   alt="" loading="eager"></div>
        <div class="item"><img src="/static/img3.jpg"   alt="" loading="eager"></div>
        <div class="item"><img src="/static/img4.jpeg"  alt="" loading="eager"></div>
        <div class="item"><img src="/static/img5.jpeg"  alt="" loading="eager"></div>
        <div class="item"><img src="/static/img6.jpeg"  alt="" loading="eager"></div>
        <div class="item"><img src="/static/img7.jpeg"  alt="" loading="eager"></div>
        <div class="item"><img src="/static/img8.jpeg"  alt="" loading="eager"></div>
        <div class="item"><img src="/static/img9.jpeg"  alt="" loading="eager"></div>
        <div class="item"><img src="/static/img10.jpeg" alt="" loading="eager"></div>
      </div>
    </div>
  </div>

  <!-- BACKGROUND CAROUSEL -->
  <div class="slider-bg-bottom">
    <div class="slider" reverse="true" style="--width:350px; --height:220px;">
      <div class="list">
        <div class="item"><img src="/static/img6.jpeg"  alt="" loading="eager"></div>
        <div class="item"><img src="/static/img7.jpeg"  alt="" loading="eager"></div>
        <div class="item"><img src="/static/img8.jpeg"  alt="" loading="eager"></div>
        <div class="item"><img src="/static/img9.jpeg"  alt="" loading="eager"></div>
        <div class="item"><img src="/static/img10.jpeg" alt="" loading="eager"></div>
        <div class="item"><img src="/static/img1.jpg"   alt="" loading="eager"></div>
        <div class="item"><img src="/static/img2.jpg"   alt="" loading="eager"></div>
        <div class="item"><img src="/static/img3.jpg"   alt="" loading="eager"></div>
        <div class="item"><img src="/static/img4.jpeg"  alt="" loading="eager"></div>
        <div class="item"><img src="/static/img5.jpeg"  alt="" loading="eager"></div>
        <!-- Duplicate set -->
        <div class="item"><img src="/static/img6.jpeg"  alt="" loading="eager"></div>
        <div class="item"><img src="/static/img7.jpeg"  alt="" loading="eager"></div>
        <div class="item"><img src="/static/img8.jpeg"  alt="" loading="eager"></div>
        <div class="item"><img src="/static/img9.jpeg"  alt="" loading="eager"></div>
        <div class="item"><img src="/static/img10.jpeg" alt="" loading="eager"></div>
        <div class="item"><img src="/static/img1.jpg"   alt="" loading="eager"></div>
        <div class="item"><img src="/static/img2.jpg"   alt="" loading="eager"></div>
        <div class="item"><img src="/static/img3.jpg"   alt="" loading="eager"></div>
        <div class="item"><img src="/static/img4.jpeg"  alt="" loading="eager"></div>
        <div class="item"><img src="/static/img5.jpeg"  alt="" loading="eager"></div>
      </div>
    </div>
  </div>


  <!--
       MAIN PAGE CONTENT -->
  <div id="page-content">

    <!-- Frosted glass search card -->
    <div class="search-card">
      <h1>PoPCorn Picker</h1>
      <p class="subtitle">Find your perfect movie 🍿</p>

      <!-- autocomplete.js hooks into this input using id="autoComplete" -->
      <input
        type="text"
        name="movie"
        class="movie"
        id="autoComplete"
        autocomplete="off"
        placeholder="Enter the Movie Name"
        required
      />

      <div class="btn-row">
        <!-- Disabled until the user types something — enabled by recommend.js -->
        <button class="btn-search movie-button" disabled>Search</button>
        <!-- Clicking this plays the clapperboard overlay then goes to /dual -->
        <a href="/dual" class="btn-together">Watch Together 🎬</a>
      </div>
    </div>

    <!-- Shown when the movie is not found in our database -->
    <div class="fail">
      <h3>Sorry! We couldn't find that movie. Please try a different one.</h3>
    </div>

    <!-- recommend.js injects the rendered recommend.html here after a search -->
    <div class="results">
      <center><h2 id="name" class="text-uppercase" style="color:white;"></h2></center>
    </div>

  </div><!-- /#page-content -->


  <!-- POPcorn loading animation -->
  <div id="loader">
    <div class="popcorn-box">
      <div class="kernels">
        <div class="kernel"></div>
        <div class="kernel"></div>
        <div class="kernel"></div>
        <div class="kernel"></div>
        <div class="kernel"></div>
      </div>
    </div>
    <div class="loader-text">Finding your movie…</div>
  </div>


  <!--
       WATCH TOGETHER ANIMATION-->
  <div id="watchTogetherOverlay">
    <div class="clapperboard">
      <div class="clapper-top">
        <div class="clapper-stripes"><span></span></div>
      </div>
      <div class="clapper-body-lines">
        <div></div>
        <div></div>
        <div></div>
      </div>
    </div>
    <div class="film-dots">
      <div class="film-dot"></div>
      <div class="film-dot"></div>
      <div class="film-dot"></div>
      <div class="film-dot"></div>
      <div class="film-dot"></div>
    </div>
    <div class="overlay-text">Watch Together 🎬</div>
  </div>


  <!-- Footer -->
  <div class="footer">© 2026, Made By Sanjana Nakum</div>


  <!-- jQuery must come before Bootstrap and our own scripts -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>

  <!-- AutoComplete dropdown library -->
  <script src="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@7.2.0/dist/js/autoComplete.min.js"></script>

  <!-- Our own JS files (served from Flask's /static folder) -->
  <script type="text/javascript" src="/static/autocomplete.js"></script>
  <script type="text/javascript" src="/static/recommend.js"></script>

  <script>
    // Show the clapperboard overlay for 1.2s before navigating to /dual
    // so the transition feels intentional rather than a plain page jump
    document.querySelector('.btn-together').addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById('watchTogetherOverlay').classList.add('active');
      setTimeout(() => { window.location.href = this.href; }, 1200);
    });

    // After AJAX injects recommend.html into .results, move all Bootstrap modals
    // up to <body> so their backdrop doesn't get trapped in the stacking context
    $(document).ajaxComplete(function() {
      $('.results .modal').each(function() { $(this).appendTo('body'); });
    });
  </script>

</body>
</html>
